services:
  - type: web
    name: drizzle-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: WEATHER_MCP_URL
        sync: false
      - key: TRAFFIC_MCP_URL
        sync: false
      - key: SOCIAL_MCP_URL
        sync: false
    healthCheckPath: /health
